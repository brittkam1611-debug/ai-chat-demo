<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre-Course Confidence Poll</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d1a;
    color: #c0c0e0;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .card {
    background: #13132a;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 32px 36px;
    max-width: 680px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(108,99,255,0.15);
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #6c63ff;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 22px;
    color: #ffffff;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .subtitle {
    font-size: 13px;
    color: #7a7a9a;
    margin-bottom: 28px;
  }

  .question {
    font-size: 15px;
    color: #c0c0e0;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .scale-wrap {
    display: flex;
    gap: 10px;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .scale-btn {
    flex: 1;
    background: #1a1a35;
    border: 2px solid #2a2a4a;
    border-radius: 10px;
    padding: 14px 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s ease;
    color: #7a7a9a;
  }

  .scale-btn:hover {
    border-color: #6c63ff;
    color: #ffffff;
    background: #1e1e40;
  }

  .scale-btn.selected {
    border-color: #6c63ff;
    background: linear-gradient(135deg, #6c63ff22, #6c63ff44);
    color: #ffffff;
    box-shadow: 0 0 12px rgba(108,99,255,0.3);
  }

  .scale-btn .num {
    font-size: 22px;
    font-weight: 700;
    display: block;
    margin-bottom: 4px;
    color: inherit;
  }

  .scale-btn .label {
    font-size: 10px;
    line-height: 1.3;
    color: inherit;
  }

  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #7a7a9a;
    margin-bottom: 24px;
    padding: 0 2px;
  }

  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, #6c63ff, #00c8ff);
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.5px;
  }

  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .result {
    display: none;
    text-align: center;
    padding: 24px 0 8px;
  }

  .result-icon {
    font-size: 36px;
    margin-bottom: 12px;
  }

  .result-headline {
    font-size: 20px;
    color: #ffffff;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-msg {
    font-size: 14px;
    color: #7a7a9a;
    line-height: 1.6;
    max-width: 480px;
    margin: 0 auto;
  }

  .result-bar {
    height: 4px;
    border-radius: 2px;
    margin: 20px 0 0;
    background: linear-gradient(90deg, #6c63ff, #00c8ff);
  }
</style>
</head>
<body>

<div class="card">
  <div class="eyebrow">Before We Begin</div>
  <h1>Quick Check-In</h1>
  <p class="subtitle">No right or wrong answers — this is just for you.</p>

  <div id="poll-area">
    <p class="question">
      How confident are you right now in your ability to use AI tools effectively and safely at work?
    </p>

    <div class="scale-wrap" id="scale-wrap">
      <button class="scale-btn" data-val="1" onclick="select(1)">
        <span class="num">1</span>
        <span class="label">Not at all confident</span>
      </button>
      <button class="scale-btn" data-val="2" onclick="select(2)">
        <span class="num">2</span>
        <span class="label">Slightly confident</span>
      </button>
      <button class="scale-btn" data-val="3" onclick="select(3)">
        <span class="num">3</span>
        <span class="label">Somewhat confident</span>
      </button>
      <button class="scale-btn" data-val="4" onclick="select(4)">
        <span class="num">4</span>
        <span class="label">Quite confident</span>
      </button>
      <button class="scale-btn" data-val="5" onclick="select(5)">
        <span class="num">5</span>
        <span class="label">Very confident</span>
      </button>
    </div>
    <div class="scale-labels">
      <span>Not confident at all</span>
      <span>Completely confident</span>
    </div>

    <button class="submit-btn" id="submit-btn" disabled onclick="submit()">Submit</button>
  </div>

  <div class="result" id="result">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-headline" id="result-headline"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-bar"></div>
  </div>
</div>

<script>
  let chosen = null;

  function select(val) {
    chosen = val;
    document.querySelectorAll('.scale-btn').forEach(btn => {
      btn.classList.toggle('selected', parseInt(btn.dataset.val) === val);
    });
    document.getElementById('submit-btn').disabled = false;
  }

  function submit() {
    const messages = {
      1: {
        icon: '🌱',
        headline: "Perfect starting point.",
        msg: "Everyone starts somewhere. By the end of this course, you'll have real frameworks and hands-on practice to feel grounded using AI at work."
      },
      2: {
        icon: '📡',
        headline: "You're picking up signals.",
        msg: "You've got some awareness — now let's build the skills to match. This course will help you move from instinct to intention."
      },
      3: {
        icon: '🔧',
        headline: "Good foundation to build on.",
        msg: "You're in the right place. We'll sharpen your prompting skills, close the gaps, and help you use AI with more confidence and less guesswork."
      },
      4: {
        icon: '⚡',
        headline: "Solid. Let's level it up.",
        msg: "You're already doing well — this course will refine your approach, introduce the CRAFT framework, and make sure you're handling AI safely and strategically."
      },
      5: {
        icon: '🚀',
        headline: "Bring that energy!",
        msg: "Great confidence. Use this course to pressure-test your assumptions, explore the ethics layer, and sharpen the skills that separate good AI users from great ones."
      }
    };

    const m = messages[chosen];
    document.getElementById('result-icon').textContent = m.icon;
    document.getElementById('result-headline').textContent = m.headline;
    document.getElementById('result-msg').textContent = m.msg;

    document.getElementById('poll-area').style.display = 'none';
    document.getElementById('result').style.display = 'block';
  }
</script>

</body>
</html>
